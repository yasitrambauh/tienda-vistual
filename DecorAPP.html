<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DecorApp Business AI - Versión Completa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&family=Montserrat:wght@800&family=Pacific+Script&family=Bebas+Neue&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --ia: #8b5cf6; --bg: #0d0f14; --panel: #1a1d24; --green: #2ed573; --blue: #3498db; --red: #ff4757; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: var(--panel); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #333; height: 60px; z-index: 1000; }
        
        #nav-menu { display: flex; background: #252831; border-bottom: 1px solid #444; width: 100%; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; color: #888; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; transition: 0.3s; border-bottom: 3px solid transparent; text-align: center; }
        .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: #1a1d24; }

        main { display: flex; flex: 1; overflow: hidden; }
        #left-panel { width: 340px; background: var(--panel); border-right: 2px solid #333; height: 100%; overflow-y: auto; }
        .tab-content { padding: 20px; display: none; }
        .tab-content.active { display: block; }

        .section { background: #252831; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        label { font-size: 11px; color: var(--gold); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 10px; }

        .btn { border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; color: white; width: 100%; margin-bottom: 8px; transition: 0.2s; text-align: center; display: block; }
        .btn-ia { background: linear-gradient(45deg, #8b5cf6, #d4af37); box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3); }
        .btn-save { background: var(--green); width: auto; padding: 8px 15px; }
        
        select, input[type="text"] { width: 100%; padding: 12px; border-radius: 6px; border: none; background: #000; color: white; margin-bottom: 10px; font-size: 13px; }

        #workspace { flex: 1; background: #000; position: relative; overflow: hidden; }
        #canvas-container { width: 100%; height: 100%; position: relative; background-color: #222; background-size: cover; background-position: center; }
        
        .deco-obj { position: absolute; cursor: move; touch-action: none; z-index: 10; }
        .deco-obj.selected { outline: 2px dashed var(--ia); outline-offset: 4px; }
        .deco-obj.locked { outline: 2px solid var(--red); opacity: 0.8; }
        
        .handle { width: 24px; height: 24px; background: var(--ia); position: absolute; right: -12px; bottom: -12px; cursor: nwse-resize; border-radius: 50%; display: none; border: 3px solid white; z-index: 100; }
        .selected .handle { display: block; }

        /* ESTILOS GEOMÉTRICOS */
        .geo-shape { width: 100%; height: 100%; display: block; }
        .shape-cilindro { border-radius: 50% / 15%; background: linear-gradient(90deg, #d4af37 0%, #f1d37e 50%, #d4af37 100%); border: 1px solid rgba(0,0,0,0.1); }
        .shape-cuadrado { background: #eee; box-shadow: inset -15px -15px 30px rgba(0,0,0,0.2); border: 1px solid #ccc; }
        .shape-circulo { border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fff, #d4af37); }

        .gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold; color:var(--gold);">✨ DECORAPP BUSINESS AI</div>
    <button class="btn btn-save" onclick="guardarDiseno()">💾 GUARDAR PROYECTO HD</button>
</header>

<nav id="nav-menu">
    <button class="nav-btn active" onclick="switchTab(event, 'tab-tema')">🖼️ TEMA / FORMAS</button>
    <button class="nav-btn" onclick="switchTab(event, 'tab-letra')">🔠 LETRA</button>
    <button class="nav-btn" onclick="switchTab(event, 'tab-objeto')">⚙️ OBJETO / IA</button>
</nav>

<main>
    <aside id="left-panel">
        <div id="tab-tema" class="tab-content active">
            <label>1. Fondo del Salón</label>
            <button class="btn" style="background:#444" onclick="document.getElementById('bgInput').click()">📸 SUBIR ESCENARIO</button>
            <input type="file" id="bgInput" hidden onchange="cargarFondo(this)">
            
            <label style="margin-top:20px;">2. Diseños Geográficos</label>
            <div class="gallery">
                <button class="btn" style="background:#333" onclick="addShape('shape-cilindro')">Cilindro</button>
                <button class="btn" style="background:#333" onclick="addShape('shape-cuadrado')">Rectángulo</button>
                <button class="btn" style="background:#333" onclick="addShape('shape-circulo')">Círculo</button>
                <button class="btn" style="background:#333" onclick="addImg('https://cdn.pixabay.com/photo/2016/11/18/15/44/balloons-1835431_1280.png')">Globos</button>
            </div>
        </div>

        <div id="tab-letra" class="tab-content">
            <label>Escribir Texto</label>
            <input type="text" id="textInput" placeholder="Ej: Mi Boda...">
            
            <label>Cambiar Diseño de Letra</label>
            <select id="fontSelect">
                <option value="'Great Vibes', cursive">Elegante Cursiva</option>
                <option value="'Bebas Neue', sans-serif">Latina / Fuerte</option>
                <option value="'Dancing Script', cursive">Manuscrita</option>
                <option value="'Playfair Display', serif">Clásica Romana</option>
                <option value="'Montserrat', sans-serif">Moderna Limpia</option>
            </select>
            <button class="btn btn-ia" onclick="addText()">AÑADIR AL DISEÑO</button>
        </div>

        <div id="tab-objeto" class="tab-content">
            <label>Herramienta IA</label>
            <button class="btn btn-ia" onclick="document.getElementById('iaInput').click()">✨ QUITAR FONDO A FOTO</button>
            <input type="file" id="iaInput" hidden accept="image/*" onchange="quitarFondoIA(this)">
            <p id="status-ia" style="font-size:10px; color:var(--gold); display:none; text-align:center;">Procesando recorte...</p>

            <label style="margin-top:20px;">Organización</label>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <button class="btn" style="background:var(--blue)" onclick="setLock(true)">🔒 FIJAR</button>
                <button class="btn" style="background:#555" onclick="setLock(false)">🔓 SOLTAR</button>
                <button class="btn" style="background:#444" onclick="cambiarCapa(10)">FRENTE</button>
                <button class="btn" style="background:#444" onclick="cambiarCapa(-10)">FONDO</button>
            </div>
            
            <button class="btn" style="background:#333; margin-top:10px;" onclick="toggleMirror()">🪞 ESPEJO</button>
            <button class="btn" style="background:var(--red); margin-top:20px;" onclick="eliminar()">🗑️ BORRAR SELECCIÓN</button>
        </div>
    </aside>

    <div id="workspace">
        <div id="canvas-container"></div>
    </div>
</main>

<script>
    const API_KEY = "TU_API_KEY_AQUI"; // Recuerda poner tu llave de Remove.bg aquí
    const canvas = document.getElementById('canvas-container');
    let sel = null;

    function switchTab(evt, tabId) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    async function quitarFondoIA(input) {
        if (!input.files[0]) return;
        if (API_KEY === "TU_API_KEY_AQUI") { alert("Por favor, pega tu API KEY de Remove.bg en el código."); return; }
        
        const status = document.getElementById('status-ia');
        status.style.display = "block";
        const formData = new FormData();
        formData.append('image_file', input.files[0]);

        try {
            const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                method: 'POST',
                headers: { 'X-Api-Key': API_KEY },
                body: formData
            });
            if (response.ok) {
                const blob = await response.blob();
                addImg(URL.createObjectURL(blob));
            } else { alert("Error con la IA de recorte."); }
        } catch (e) { console.error(e); } finally { status.style.display = "none"; }
    }

    function cargarFondo(input) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => canvas.style.backgroundImage = `url(${e.target.result})`;
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addShape(tipo) {
        const div = document.createElement('div');
        div.className = 'deco-obj';
        div.style.cssText = "width:150px; height:200px; left:100px; top:100px;";
        div.innerHTML = `<div class="geo-shape ${tipo}"></div><div class="handle"></div>`;
        insertar(div);
    }

    function addText() {
        const txt = document.getElementById('textInput').value || "Nombre";
        const font = document.getElementById('fontSelect').value;
        const div = document.createElement('div');
        div.className = 'deco-obj';
        div.style.cssText = `left:50px; top:50px; font-size:70px; color:var(--gold); font-family:${font};`;
        div.innerHTML = `<span style="white-space:nowrap;">${txt}</span><div class="handle"></div>`;
        insertar(div);
    }

    function addImg(src) {
        const div = document.createElement('div');
        div.className = 'deco-obj';
        div.style.cssText = "width:250px; left:50px; top:50px;";
        div.innerHTML = `<img src="${src}" style="width:100%; height:100%;"><div class="handle"></div>`;
        insertar(div);
    }

    function insertar(div) {
        canvas.appendChild(div);
        vincularEventos(div);
        seleccionar(div);
    }

    function seleccionar(el) {
        if (sel) sel.classList.remove('selected');
        sel = el;
        sel.classList.add('selected');
    }

    function vincularEventos(el) {
        let isM = false, ox, oy, sx, sy;
        el.onpointerdown = (e) => {
            if (e.target.classList.contains('handle')) return;
            e.stopPropagation();
            if (el.dataset.locked === "true") return;
            seleccionar(el);
            isM = true; sx = e.clientX; sy = e.clientY; ox = el.offsetLeft; oy = el.offsetTop;
            el.setPointerCapture(e.pointerId);
        };
        el.onpointermove = (e) => { if (isM) { el.style.left = (ox + (e.clientX - sx)) + "px"; el.style.top = (oy + (e.clientY - sy)) + "px"; } };
        el.onpointerup = () => isM = false;

        const h = el.querySelector('.handle');
        let isR = false, sw, sh, sf;
        h.onpointerdown = (e) => { 
            e.stopPropagation(); isR = true; 
            sw = el.offsetWidth; sh = el.offsetHeight; 
            sf = parseFloat(window.getComputedStyle(el).fontSize); 
            sx = e.clientX; sy = e.clientY;
            h.setPointerCapture(e.pointerId); 
        };
        h.onpointermove = (e) => { 
            if (isR) { 
                let dx = e.clientX - sx;
                let dy = e.clientY - sy;
                if (el.querySelector('span')) {
                    el.style.fontSize = (sf * ((sw + dx) / sw)) + "px";
                } else {
                    el.style.width = (sw + dx) + "px";
                    el.style.height = (sh + dy) + "px";
                }
            } 
        };
        h.onpointerup = () => isR = false;
    }

    function setLock(s) { if(sel) { sel.dataset.locked = s; sel.classList.toggle('locked', s); if(s) sel.classList.remove('selected'); } }
    function cambiarCapa(v) { if(sel) { let z = parseInt(window.getComputedStyle(sel).zIndex) || 10; sel.style.zIndex = z + v; } }
    function toggleMirror() { if(sel) { sel.dataset.f = sel.dataset.f === "-1" ? "1" : "-1"; sel.querySelector('img, span, .geo-shape').style.transform = `scaleX(${sel.dataset.f})`; } }
    function eliminar() { if(sel && sel.dataset.locked !== "true") { sel.remove(); sel = null; } }

    function guardarDiseno() {
        if (sel) sel.classList.remove('selected');
        html2canvas(canvas, { useCORS: true, scale: 2 }).then(c => {
            const a = document.createElement('a'); a.download = 'mi_diseno.png'; a.href = c.toDataURL(); a.click();
        });
    }

    canvas.onpointerdown = (e) => { if (e.target === canvas) { if (sel) sel.classList.remove('selected'); sel = null; } };
</script>
</body>
</html>
